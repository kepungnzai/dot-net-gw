name: Build and Deploy Azure Function

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: ${{ secrets.TF_VAR_FUNCTION_APP_NAME }}   # uses the same secret as the infra workflow
  CONTAINER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/dot-net-gw

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: 'Set lower case image name'
        run: |
          echo "REGISTRY_IMAGE=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> ${GITHUB_ENV}
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> ${GITHUB_ENV}

      - name: 'Debug Image Name'
        run: |
          echo "Registry Image: $REGISTRY_IMAGE"
          echo "Short SHA: $SHORT_SHA"
          echo "Registry: ${{ env.CONTAINER_REGISTRY }}"

      # - name: 'Build and push image'
      #   run: |
      #     docker build . -t ${{ env.CONTAINER_REGISTRY }}/$REGISTRY_IMAGE:$SHORT_SHA
      #     docker push ${{ env.CONTAINER_REGISTRY }}/$REGISTRY_IMAGE:$SHORT_SHA

      - name: 'Login to Azure'
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 'Deploy to Azure Functions'
        uses: azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          image: ${{ env.CONTAINER_REGISTRY }}/${{ env.REGISTRY_IMAGE }}:${{ env.SHORT_SHA }}
